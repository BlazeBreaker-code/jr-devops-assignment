name: Run Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Ensure CLI scripts have executable perms
      - name: Make CLI scripts executable
        run: chmod +x build.sh upload.sh
        
      # CLI call to simulated build process
      - name: Run Build
        run: |
          appName="Test App"
          ./build.sh --platform Android --project-name "$appName"

      # CLI call to simulated upload process
      - name: Upload
        run: |
          ./upload.sh build/android